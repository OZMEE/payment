server:
  host: "0.0.0.0"
  port: 8080
database:
  driver: postgres
  host: db
  port: 5432
  user : postgres
  #password: в .env
  name: myapp_db
  migrations_path: /app/deploy
cache:
  host: redis
  port: 6379
  #password: в .env
  db: 0
  expiration_minutes: 10
kafka:
  brokers:
   - "kafka:9093"
  payment_topic: "payment-events"
  common_topic: "common-events"
  acks: -1
  linger_ms: 10
  batch_size: 16384
  record_retries: 3
  record_delivery_timeout: 30
  max_buffered_records: 10000
  max_buffered_bytes: 104857600
  dial_timeout: 5
  context_timeout: 5
worker:
  count: 5
  max_attempts: 3
  timeout_sec: 5
  limit_events: 3